repo_description_lines_max: 2

highlights:
  - name: CMS Hospitalization Risk Pipeline
    url: https://github.com/KaurMahima/cms-hospitalization-risk-pipeline
    description: Processes CMS beneficiary and inpatient claims data with a Snakemake workflow and presents hospitalization-risk trends in a Dash application.
  - name: Healthcare SQL Analytics
    url: https://github.com/KaurMahima/healthcare-sql-analytics
    description: Uses Python, DuckDB, and SQL to clean and analyze almost 50,000 healthcare admissions, including readmission and cost metrics.
  - name: Airflow COVID Mini Pipeline
    url: https://github.com/KaurMahima/airflow-covid-mini-pipeline
    description: Demonstrates a reproducible ETL workflow from CDC COVID data to Parquet, DuckDB analytics, and generated reports.
  - name: Citi Bike Analytics Platform
    url: https://github.com/KaurMahima/citibike-analytics-platform
    description: Combines Citi Bike trips and NOAA weather using Python, DuckDB, dbt, and a Streamlit dashboard.
  - name: LinkShelf
    url: https://github.com/KaurMahima/linkshelf
    description: A Flask bookmark application with PostgreSQL deployment support and optional AI-generated link summaries.

